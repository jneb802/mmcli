name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.release.tag_name }}
      sha256_arm64: ${{ steps.hashes.outputs.arm64 }}
      sha256_amd64: ${{ steps.hashes.outputs.amd64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -o dist/mmcli-darwin-arm64 -ldflags "-X mmcli/cmd.Version=$VERSION" .
          GOOS=darwin GOARCH=amd64 go build -o dist/mmcli-darwin-amd64 -ldflags "-X mmcli/cmd.Version=$VERSION" .
          GOOS=linux GOARCH=amd64 go build -o dist/mmcli-agent-linux-amd64 -ldflags "-X main.Version=$VERSION" ./cmd/agent

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "arm64=$(shasum -a 256 dist/mmcli-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "amd64=$(shasum -a 256 dist/mmcli-darwin-amd64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/mmcli-darwin-arm64 \
            dist/mmcli-darwin-amd64 \
            dist/mmcli-agent-linux-amd64

  update-homebrew:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: jneb802/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ needs.build-and-upload.outputs.version }}
          SHA256_ARM64: ${{ needs.build-and-upload.outputs.sha256_arm64 }}
          SHA256_AMD64: ${{ needs.build-and-upload.outputs.sha256_amd64 }}
        run: |
          cat > Formula/mmcli.rb << FORMULA
          class Mmcli < Formula
            desc "Command-line Valheim mod manager for macOS"
            homepage "https://github.com/jneb802/mmcli"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jneb802/mmcli/releases/download/${VERSION}/mmcli-darwin-arm64"
                sha256 "${SHA256_ARM64}"
              else
                url "https://github.com/jneb802/mmcli/releases/download/${VERSION}/mmcli-darwin-amd64"
                sha256 "${SHA256_AMD64}"
              end
            end

            def install
              cpu = Hardware::CPU.arm? ? "arm64" : "amd64"
              bin.install "mmcli-darwin-#{cpu}" => "mmcli"
            end

            test do
              assert_match "Valheim mod manager", shell_output("#{bin}/mmcli --help")
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/mmcli.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mmcli.rb
          git commit -m "Update mmcli to ${{ needs.build-and-upload.outputs.version }}"
          git push
