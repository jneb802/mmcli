name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
      sha256_arm64: ${{ steps.hashes.outputs.arm64 }}
      sha256_amd64: ${{ steps.hashes.outputs.amd64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          latest=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            # Bump patch version
            major=$(echo "$latest" | cut -d. -f1)
            minor=$(echo "$latest" | cut -d. -f2)
            patch=$(echo "$latest" | cut -d. -f3)
            next="${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        if: steps.check.outputs.skip == 'false'
        with:
          go-version-file: go.mod

      - name: Build release binaries
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -o dist/mmcli-darwin-arm64 -ldflags "-X mmcli/cmd.Version=$VERSION" .
          GOOS=darwin GOARCH=amd64 go build -o dist/mmcli-darwin-amd64 -ldflags "-X mmcli/cmd.Version=$VERSION" .
          GOOS=linux GOARCH=amd64 go build -o dist/mmcli-agent-linux-amd64 -ldflags "-X main.Version=$VERSION" ./cmd/agent

      - name: Compute SHA256 hashes
        if: steps.check.outputs.skip == 'false'
        id: hashes
        run: |
          echo "arm64=$(shasum -a 256 dist/mmcli-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "amd64=$(shasum -a 256 dist/mmcli-darwin-amd64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            dist/mmcli-darwin-arm64 \
            dist/mmcli-darwin-amd64 \
            dist/mmcli-agent-linux-amd64

  update-homebrew:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: jneb802/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256_ARM64: ${{ needs.release.outputs.sha256_arm64 }}
          SHA256_AMD64: ${{ needs.release.outputs.sha256_amd64 }}
        run: |
          cat > Formula/mmcli.rb << FORMULA
          class Mmcli < Formula
            desc "Command-line Valheim mod manager for macOS"
            homepage "https://github.com/jneb802/mmcli"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jneb802/mmcli/releases/download/${VERSION}/mmcli-darwin-arm64"
                sha256 "${SHA256_ARM64}"
              else
                url "https://github.com/jneb802/mmcli/releases/download/${VERSION}/mmcli-darwin-amd64"
                sha256 "${SHA256_AMD64}"
              end
            end

            def install
              cpu = Hardware::CPU.arm? ? "arm64" : "amd64"
              bin.install "mmcli-darwin-#{cpu}" => "mmcli"
            end

            test do
              assert_match "Valheim mod manager", shell_output("#{bin}/mmcli --help")
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/mmcli.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mmcli.rb
          git commit -m "Update mmcli to ${{ needs.release.outputs.version }}"
          git push
